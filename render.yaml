services:
  - type: web
    name: sequoia-v2
    env: node
    buildCommand: npm install && cd client && npm install && cd .. && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    disk:
      name: database-storage
      mountPath: /var/data
      sizeGB: 1
